name: CI

on:
  push: # на все ветки, а не только main — фиче-работа проверяется до мержа
  pull_request:

# Отменять устаревшие run'ы того же ref при новом пуше (экономия минут).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Typecheck
        run: uv run mypy

      - name: Tests
        run: uv run pytest

      - name: Evals (MVP criteria §26)
        run: uv run pytest evals
